<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Programa de Parentalidade Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Outfit', sans-serif; }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        .step-card {
            display: none;
        }
        .step-card.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <!-- Barra de Progresso Superior -->
        <div class="h-2 bg-gray-100 w-full">
            <div id="progress-bar" class="h-full bg-red-500 transition-all duration-500 w-1/2"></div>
        </div>

        <div class="p-8 md:p-12">
            <!-- Cabeçalho do Formulário -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-900">Inscrição no Programa</h1>
                <p class="text-gray-500 mt-2">Estamos felizes em fazer parte deste momento!</p>
            </div>

            <!-- Formulário -->
            <form id="enrollmentForm" onsubmit="handleSubmit(event)">
                
                <!-- Seção 1: Dados do Foodlover -->
                <div id="step-1" class="step-card active space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-gray-700 ml-1">Data da Inscrição</label>
                        <input type="text" id="regDate" class="form-input bg-gray-50 text-gray-500 cursor-not-allowed" readonly>
                    </div>

                    <div class="space-y-2">
                        <label for="fullName" class="text-sm font-semibold text-gray-700 ml-1">Nome Completo do Foodlover</label>
                        <input type="text" id="fullName" required placeholder="Seu nome completo" class="form-input">
                    </div>

                    <div class="space-y-2">
                        <label for="email" class="text-sm font-semibold text-gray-700 ml-1">E-mail iFood</label>
                        <input type="email" id="email" required placeholder="seuemail@ifood.com.br" class="form-input">
                        <p id="emailError" class="hidden text-xs text-red-500 mt-1">Por favor, utilize seu e-mail institucional @ifood.</p>
                    </div>

                    <div class="pt-4">
                        <button type="button" onclick="nextStep()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-red-200">
                            Próximo Passo
                        </button>
                    </div>
                </div>

                <!-- Seção 2: Dados da Gestação -->
                <div id="step-2" class="step-card space-y-6">
                    <div class="space-y-2">
                        <label for="gestWeeks" class="text-sm font-semibold text-gray-700 ml-1">Semanas de Gestação</label>
                        <input type="number" id="gestWeeks" required min="1" max="42" placeholder="Ex: 12" class="form-input">
                        <p class="text-[10px] text-gray-400">Insira o número aproximado de semanas atuais.</p>
                    </div>

                    <div class="space-y-2">
                        <label for="dueDate" class="text-sm font-semibold text-gray-700 ml-1">Data Prevista do Parto (DPP)</label>
                        <input type="date" id="dueDate" required class="form-input">
                    </div>

                    <div class="flex flex-col gap-3 pt-4">
                        <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-red-200">
                            Finalizar Inscrição
                        </button>
                        <button type="button" onclick="prevStep()" class="w-full bg-white border border-gray-200 text-gray-500 font-semibold py-3 rounded-xl hover:bg-gray-50 transition-all">
                            Voltar
                        </button>
                    </div>
                </div>
            </form>

            <!-- Mensagem de Sucesso -->
            <div id="success-message" class="hidden text-center py-10">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Inscrição Confirmada!</h2>
                <p class="text-gray-600 mb-8">Recebemos seus dados. Em breve você receberá um e-mail com os próximos passos do programa.</p>
                <button onclick="resetForm()" class="text-red-500 font-semibold hover:underline">
                    Fazer nova inscrição
                </button>
            </div>
        </div>
    </div>

    <script>
        // Preencher data atual automaticamente
        window.onload = () => {
            const now = new Date();
            const dateStr = now.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
            document.getElementById('regDate').value = dateStr;
        };

        function nextStep() {
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const emailError = document.getElementById('emailError');

            if (!name || !email) {
                return; // HTML5 validation will handle this
            }

            if (!email.toLowerCase().endsWith('@ifood.com.br')) {
                emailError.classList.remove('hidden');
                return;
            } else {
                emailError.classList.add('hidden');
            }

            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('progress-bar').style.width = '100%';
        }

        function prevStep() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('progress-bar').style.width = '50%';
        }

        function handleSubmit(event) {
            event.preventDefault();
            
            // Aqui os dados seriam enviados para um backend/planilha
            const formData = {
                data_inscricao: document.getElementById('regDate').value,
                nome: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                semanas: document.getElementById('gestWeeks').value,
                data_parto: document.getElementById('dueDate').value
            };

            console.log("Dados da Inscrição:", formData);

            // Mostrar tela de sucesso
            document.getElementById('enrollmentForm').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
            document.getElementById('progress-bar').classList.add('bg-green-500');
        }

        function resetForm() {
            document.getElementById('enrollmentForm').reset();
            document.getElementById('enrollmentForm').classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
            document.getElementById('progress-bar').classList.remove('bg-green-500');
            showStep(1);
        }

        function showStep(n) {
            if (n === 1) {
                document.getElementById('step-2').classList.add('hidden');
                document.getElementById('step-1').classList.remove('hidden');
                document.getElementById('step-1').classList.add('active');
                document.getElementById('progress-bar').style.width = '50%';
            }
        }
    </script>
</body>
</html>
